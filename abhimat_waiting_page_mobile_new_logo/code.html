<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Summit - Waiting Room</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#f5993d", // Saffron
                "secondary": "#008a00", // Indian Green
                "chakra": "#000080", // Navy Blue
                "background-light": "#f8f7f5",
                "background-dark": "#221910",
              },
              fontFamily: {
                "display": ["Public Sans", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .chakra-spin {
            animation: spin 20s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 flex flex-col max-w-[450px] mx-auto shadow-2xl overflow-x-hidden" style="aspect-ratio: 9/16; min-height: auto; height: 100vh;">
<!-- Top Tricolor Stripe -->
<div class="h-2 w-full flex">
<div class="flex-1 bg-primary"></div>
<div class="flex-1 bg-white"></div>
<div class="flex-1 bg-secondary"></div>
</div>
<!-- Header / Navbar -->
<header class="flex items-center justify-between p-4 lg:px-8 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl">account_balance</span>
<span class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100 uppercase">Model Lok Sabha</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">menu</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 text-center py-4">
<!-- Hero Section with Decorative Ashoka Chakra Background -->
<div class="relative w-full max-w-2xl flex flex-col items-center">
<div class="w-48 h-48 rounded-full flex items-center justify-center overflow-hidden shadow-[0_0_30px_rgba(245,153,61,0.3)] mb-10 transition-transform hover:scale-105 duration-300">
<img alt="Summit Official Logo" class="w-full h-full object-contain" data-alt="Official logo of Summit debate event" src="{{DATA:IMAGE:IMAGE_5}}"/>
</div>
<h1 class="text-5xl md:text-7xl font-bold tracking-tight text-slate-900 dark:text-slate-100 mb-4 mt-2">Summit</h1>
<div class="h-1 w-24 bg-primary mx-auto rounded-full mb-6"></div>
<p class="text-xl md:text-2xl font-medium text-slate-600 dark:text-slate-400 mb-10 mt-2">
                Debate will start soon
            </p>
<!-- Status Card -->
<div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-xl shadow-lg border border-slate-200 dark:border-slate-800 p-6 space-y-6">
<div class="flex items-center justify-between text-sm font-semibold uppercase tracking-wider text-slate-500">
<span>Session Status</span>
<span class="flex items-center gap-2 text-primary">
<span class="relative flex h-3 w-3">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-3 w-3 bg-primary"></span>
</span>
                        Waiting Room
                    </span>
</div>
<div class="space-y-2">
<div class="flex justify-between text-xs text-slate-500">
<span>Moderators are joining...</span>
<span>85% Ready</span>
</div>
<div class="w-full h-3 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary via-primary to-secondary w-[85%] rounded-full"></div>
</div>
</div>
<div class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-100 dark:border-slate-800">
<div class="text-left">
<p class="text-xs text-slate-400 uppercase">Next Agenda</p>
<p class="text-sm font-bold">Public Policy Reform</p>
</div>
<div class="text-right">
<p class="text-xs text-slate-400 uppercase">Estimated Start</p>
<p class="text-sm font-bold">10:30 AM IST</p>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (Modified from component list) -->
<div class="mt-auto">
<div class="flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-4 pb-6 pt-3 shadow-2xl">
<a class="flex flex-1 flex-col items-center justify-center gap-1 rounded-xl py-2 text-primary" href="#">
<span class="material-symbols-outlined text-[28px]">home</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Home</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 py-2 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined text-[28px]">gavel</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Rules</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 py-2 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined text-[28px]">groups</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Delegates</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 py-2 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined text-[28px]">settings</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Settings</span>
</a>
</div>
</div>
<!-- Decorative Bottom Tricolor Stripe -->
<div class="h-1 w-full flex">
<div class="flex-1 bg-primary"></div>
<div class="flex-1 bg-white"></div>
<div class="flex-1 bg-secondary"></div>
</div>
</body></html>
