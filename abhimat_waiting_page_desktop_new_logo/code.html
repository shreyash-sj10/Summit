<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Summit - Waiting Page</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f5993d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                        "tricolor-orange": "#FF9933",
                        "tricolor-green": "#138808",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glow-effect {
            box-shadow: 0 0 40px rgba(245, 153, 61, 0.2);
        }
        .tricolor-gradient {
            background: linear-gradient(to right, #FF9933, #FFFFFF, #138808);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col items-center justify-between overflow-hidden aspect-video">
<!-- Header -->
<header class="w-full px-12 py-6 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary/10 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary">gavel</span>
</div>
<span class="text-xl font-bold tracking-tight">Summit</span>
</div>
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 rounded-full shadow-sm border border-primary/10">
<span class="w-2 h-2 rounded-full bg-tricolor-green animate-pulse"></span>
<span class="text-sm font-medium">Live Server</span>
</div>
<button class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">account_circle</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex flex-1 flex-col items-center justify-center w-full max-w-4xl px-6 text-center">
<!-- Logo Section -->
<div class="relative mb-8">
<div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full scale-150"></div>
<div class="relative w-48 h-48 md:w-56 md:h-56 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center shadow-xl glow-effect border-4 border-primary/5">
<img alt="Summit Logo" class="object-contain w-full h-full p-2" data-alt="Official Summit logo showing a scales of justice symbol" src="{{DATA:IMAGE:IMAGE_5}}"/>
</div>
</div>
<!-- Titles -->
<h1 class="text-6xl md:text-7xl font-black tracking-tighter mb-2 text-slate-900 dark:text-white">
                Summit
            </h1>
<p class="text-xl md:text-2xl font-medium text-slate-500 dark:text-slate-400 mb-12">
                Debate will start soon
            </p>
<!-- Status Cards Container -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
<!-- Session Status Card -->
<div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-100 dark:border-slate-700 flex flex-col items-start gap-4">
<div class="flex items-center justify-between w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">groups</span>
<span class="text-sm font-semibold uppercase tracking-wider text-slate-400">Session Status</span>
</div>
<span class="text-primary font-bold">85% Ready</span>
</div>
<p class="text-lg font-bold text-left text-slate-800 dark:text-slate-100">Moderators are joining...</p>
<div class="w-full h-3 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden p-[1px]">
<div class="h-full rounded-full tricolor-gradient shadow-sm" style="width: 85%;"></div>
</div>
</div>
<!-- Next Agenda Card -->
<div class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-lg border border-slate-100 dark:border-slate-700 flex flex-col items-start gap-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-tricolor-green">event_note</span>
<span class="text-sm font-semibold uppercase tracking-wider text-slate-400">Next Agenda</span>
</div>
<div class="flex flex-col items-start">
<p class="text-lg font-bold text-slate-800 dark:text-slate-100">Public Policy Reform</p>
<div class="flex items-center gap-2 text-slate-500">
<span class="material-symbols-outlined text-sm">schedule</span>
<span class="text-sm font-medium">10:30 AM IST</span>
</div>
</div>
<div class="flex -space-x-2 mt-auto">
<div class="w-8 h-8 rounded-full border-2 border-white bg-slate-200" title="Delegate 1"></div>
<div class="w-8 h-8 rounded-full border-2 border-white bg-slate-300" title="Delegate 2"></div>
<div class="w-8 h-8 rounded-full border-2 border-white bg-slate-400" title="Delegate 3"></div>
<div class="w-8 h-8 rounded-full border-2 border-white bg-primary flex items-center justify-center text-[10px] text-white font-bold">+12</div>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="w-full max-w-2xl px-8 py-4 mb-8 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md rounded-full shadow-2xl border border-white/20 flex items-center justify-around">
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">home</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-primary">Home</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">menu_book</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 group-hover:text-primary transition-colors">Rules</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">badge</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 group-hover:text-primary transition-colors">Delegates</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">settings</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 group-hover:text-primary transition-colors">Settings</span>
</a>
</nav>
<!-- Decorative Elements -->
<div class="absolute bottom-0 left-0 w-full h-1 tricolor-gradient opacity-50"></div>
</div>
</body></html>
